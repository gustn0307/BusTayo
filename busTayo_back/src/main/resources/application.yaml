  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/bustayo_db
    username: ${DB_USER:root}
    password: ${DB_PW:1111}

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        show_sql: true
        format_sql: true

    database-platform: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
            # 🟢 [추가] 구글 로그인 성공 후 백엔드로 돌아오는 리다이렉트 주소에도 /api를 정확히 심어줍니다.
            redirect-uri: "{baseUrl}/api/login/oauth2/code/{registrationId}"

        provider:
          google:
            # 🟢 [수정] 프론트엔드 로그인 버튼이 /api/oauth2/authorization/google로 찌를 수 있도록 베이스 주소를 변경합니다.
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth?prompt=select_account

