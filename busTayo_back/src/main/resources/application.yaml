spring:
  application:
    name: busTayo

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/bustayo_db
    username: ${DB_USER:root}
    password: ${DB_PW:1111}

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        show_sql: true
        format_sql: true

    database-platform: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true

