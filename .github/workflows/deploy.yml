name: Bustayo CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "busTayo_back/**"
      - "busTayo_front/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: backend
            context: busTayo_back
            image: bustayo-back
          - name: frontend
            context: busTayo_front
            image: bustayo-front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/bustayo

            echo "Pull latest Docker images..."
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull

            echo "Restart services..."
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d

            echo "Show running containers..."
            docker ps

            echo "Health check: frontend"
            for i in {1..10}; do
              if curl -fsS https://hskang.dev > /dev/null; then
                echo "Frontend is healthy"
                break
              fi

              if [ "$i" -eq 10 ]; then
                echo "Frontend health check failed"
                docker logs --tail=100 bustayo-nginx
                docker logs --tail=100 bustayo-front
                exit 1
              fi

              echo "Frontend not ready yet... retry $i/10"
              sleep 5
            done

            echo "Health check: backend"
            for i in {1..10}; do
              if curl -fsS https://api.hskang.dev > /dev/null; then
                echo "Backend is healthy"
                break
              fi

              if [ "$i" -eq 10 ]; then
                echo "Backend health check failed"
                docker logs --tail=100 bustayo-nginx
                docker logs --tail=100 bustayo-back
                exit 1
              fi

              echo "Backend not ready yet... retry $i/10"
              sleep 5
            done

            echo "Clean unused Docker images..."
            docker image prune -f

            echo "Deploy completed successfully"